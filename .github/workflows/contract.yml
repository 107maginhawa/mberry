name: Contract Tests

# Spec-first contract tests. Two layers:
#   1. Hurl scenarios under specs/api/tests/contract/ — required check.
#   2. Schemathesis schema fuzzing — shadow check (allowed to fail).
#
# Both run against whichever HTTP implementation is booted on $API_URL,
# so the same workflow can be retargeted at a Rust impl, a remote staging
# environment, etc., by swapping the boot step.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: monobase
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d monobase"
          --health-interval 5s --health-timeout 5s --health-retries 10
      # Minio cannot run as a `services:` entry: minio/minio requires
      # `server <path>` and Actions cannot pass a CMD; bitnami/minio:latest
      # was deprecated from Docker Hub. Started as a real step below.

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase
      PORT: 7213
      API_URL: http://localhost:7213
      AUTH_SECRET: contract-test-secret-do-not-use-in-prod
      # See ci.yml contract job — the suite signs up ad-hoc users and uses the
      # session immediately; verification must be off (matches local dev .env).
      AUTH_REQUIRE_EMAIL_VERIFICATION: false
      # Runner auto-promotes this email to platform_admin; admin-gated flows
      # (GET /audit/logs cross-org reads) need it. Matches local dev .env.
      AUTH_ADMIN_EMAILS: admin@contract-tests.local
      # HMAC secret for one-tap dues payment tokens — getPaymentTokenSecret()
      # 500s without it (send-link + /pay/:token/validate). Matches local dev .env.
      PAYMENT_TOKEN_SECRET: contract-test-payment-secret-do-not-use-in-prod
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: monobase-files
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      - name: Start minio (server mode)
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            --health-cmd "curl -fsS http://localhost:9000/minio/health/live" \
            --health-interval=5s --health-timeout=5s --health-retries=20 \
            minio/minio:latest server /data
          # Wait until healthy or fail after ~60 s
          for i in $(seq 1 12); do
            status=$(docker inspect --format='{{.State.Health.Status}}' minio 2>/dev/null || echo "starting")
            echo "minio health: $status"
            if [ "$status" = "healthy" ]; then break; fi
            sleep 5
          done
          if [ "$(docker inspect --format='{{.State.Health.Status}}' minio)" != "healthy" ]; then
            echo "minio did not become healthy in time" >&2
            docker logs minio
            exit 1
          fi
          # Create the default bucket the contract suite expects.
          docker run --rm --network host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:9000 \
            minio/mc mb --ignore-existing local/monobase-files

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install Hurl
        run: |
          curl -fsSL -o /tmp/hurl.deb \
            https://github.com/Orange-OpenSource/hurl/releases/download/8.0.1/hurl_8.0.1_amd64.deb
          sudo dpkg -i /tmp/hurl.deb

      - name: Install Schemathesis
        run: pipx install schemathesis

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build the OpenAPI spec
        run: cd specs/api && bun run build

      # ----- Implementation under test: services/api-ts (TypeScript) -----
      # Swap this step when testing a different impl (e.g. services/api-rs).

      - name: Generate API codegen
        run: cd services/api-ts && bun run generate

      - name: Boot the implementation
        run: |
          cd services/api-ts
          bun dev > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid

      - name: Wait for /readyz
        run: |
          # /readyz returns 200 only after migrations + storage + jobs scheduler
          # have all initialized — required before the seed step so it does not
          # race in-flight migrations.
          for i in {1..60}; do
            curl -fsS "$API_URL/readyz" && exit 0
            sleep 1
          done
          echo "API never became ready"
          tail -200 /tmp/api.log
          exit 1

      - name: Seed database
        # The contract scenarios depend on a seeded org + officer
        # (test@memberry.ph / vicepresident@memberry.ph). TS-impl specific, like
        # the boot step above.
        run: cd services/api-ts && bun run db:seed

      # ----- Contract checks -----

      - name: Hurl contract scenarios
        run: bun run test:contract

      - name: Schemathesis fuzz (shadow)
        continue-on-error: true
        # Hard cap so the shadow fuzz can never exhaust the job's 15-min budget.
        # Now that the Hurl step passes (it used to fail fast and skip this), the
        # fuzz runs to completion and previously timed the whole job out.
        # continue-on-error swallows a step-level timeout — the job stays green.
        timeout-minutes: 6
        run: bun run test:contract:fuzz

      - name: API logs (always)
        if: always()
        run: tail -500 /tmp/api.log || true

      - name: Stop the implementation
        if: always()
        run: kill "$(cat /tmp/api.pid)" || true

  coverage-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Test registry coverage
        run: bun run test:registry

      - name: BR coverage gate
        run: bun run test:br --ci

      - name: Shallow test lint (informational)
        run: bun run lint:shallow --ci
        continue-on-error: true
