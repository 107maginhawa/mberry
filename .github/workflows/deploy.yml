name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api-ts/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
            ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image tag output
        id: image-tag
        run: echo "image_tag=ghcr.io/${{ github.repository }}/api:${{ github.sha }}" >> $GITHUB_OUTPUT

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - run: bun install --frozen-lockfile

      - name: Build OpenAPI spec
        run: bun --filter @monobase/api-spec run build

      - name: Generate API codegen
        run: bun --filter @monobase/api-ts run generate

      - name: Build Memberry app
        env:
          VITE_API_URL: ${{ vars.STAGING_API_URL || '' }}
        run: cd apps/memberry && bun run build

      - name: Build Admin app
        env:
          VITE_API_URL: ${{ vars.STAGING_API_URL || '' }}
        run: cd apps/admin && bun run build

      - name: Build Account app
        env:
          VITE_API_URL: ${{ vars.STAGING_API_URL || '' }}
        run: cd apps/account && bun run build

      - name: Upload frontend-memberry artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-memberry
          path: apps/memberry/dist/

      - name: Upload frontend-admin artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-admin
          path: apps/admin/dist/

      - name: Upload frontend-account artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-account
          path: apps/account/dist/

  deploy-staging:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend-memberry artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-memberry
          path: apps/memberry/dist/

      - name: Download frontend-admin artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-admin
          path: apps/admin/dist/

      - name: Download frontend-account artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-account
          path: apps/account/dist/

      - name: Deploy API to staging
        run: |
          echo "::notice::Deploy API image ${{ needs.build.outputs.image_tag }} to staging"
          echo "TODO: Add platform-specific deploy command here"
          echo "Example: railway up --image ${{ needs.build.outputs.image_tag }}"
          echo "Example: fly deploy --image ${{ needs.build.outputs.image_tag }}"

      - name: Deploy frontends to staging
        run: |
          echo "::notice::Deploy frontend artifacts to staging"
          echo "TODO: Add platform-specific deploy command here"
          echo "Example: wrangler pages deploy apps/memberry/dist/ --project-name memberry-staging"

      - name: Health check — staging API
        if: vars.STAGING_API_URL != ''
        run: |
          DEPLOY_URL="${{ vars.STAGING_API_URL }}"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/readyz")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "Staging API ready" && exit 0
            sleep 5
          done
          echo "::error::Staging health check failed after 150s"
          exit 1

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend-memberry artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-memberry
          path: apps/memberry/dist/

      - name: Download frontend-admin artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-admin
          path: apps/admin/dist/

      - name: Download frontend-account artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-account
          path: apps/account/dist/

      - name: Deploy API to production
        run: |
          echo "::notice::Deploy API image ${{ needs.build.outputs.image_tag }} to production"
          echo "TODO: Add platform-specific deploy command here"
          echo "Uses SAME image SHA that was validated in staging"

      - name: Deploy frontends to production
        run: |
          echo "::notice::Deploy frontend artifacts to production"
          echo "TODO: Add platform-specific deploy command here"
          echo "Example: wrangler pages deploy apps/memberry/dist/ --project-name memberry-production"

      - name: Health check — production API
        if: vars.PRODUCTION_API_URL != ''
        run: |
          DEPLOY_URL="${{ vars.PRODUCTION_API_URL }}"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/readyz")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Production API ready"
              # Double-check: verify /readyz returns healthy JSON
              curl -s "$DEPLOY_URL/readyz" | grep -q '"status":"ok"' || {
                echo "::warning::API responded 200 but readyz body unexpected"
              }
              exit 0
            fi
            sleep 5
          done
          echo "::error::Production health check failed after 150s"
          exit 1

      - name: Smoke test — production
        if: vars.PRODUCTION_API_URL != ''
        run: |
          # Verify key endpoints respond
          curl -fsS "${{ vars.PRODUCTION_API_URL }}/livez" || exit 1
          echo "Production smoke test passed"
