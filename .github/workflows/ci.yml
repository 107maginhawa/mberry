name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: UTC
      AUTH_SECRET: ci-codegen-secret-do-not-use-in-prod
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Build OpenAPI spec
        run: bun run --filter @monobase/api-spec build
      - name: Generate API codegen
        run: bun run --filter @monobase/api-ts generate
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Migration safety lint
        run: bun run lint:migrations
      - name: No silent test skips
        run: bun run lint:no-skips
      - name: Shallow test assertion lint
        run: bun run lint:shallow --ci
      - name: Check SDK freshness
        run: |
          bun run --filter @monobase/sdk-ts generate
          git diff --exit-code packages/sdk-ts/src/generated/
      - name: Dependency audit
        run: bunx audit-ci --moderate || true

  # NOTE (lean launch): the memberry/admin E2E jobs (e2e-memberry, e2e-admin, the
  # e2e aggregator) and the frontend build/smoke jobs (build-frontends,
  # artifact-smoke) were retired with the deleted apps. Re-add app-scoped E2E +
  # build jobs here when apps/org, apps/member, apps/console land — pointed at the
  # lean apps on packages/ui. The engine gates below (contract, unit, coverage,
  # build-api) protect the frozen API and stay green throughout.

  member:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Build (tsc-b + vite; generates routeTree.gen.ts via TanStack plugin)
        run: bun run --filter @monobase/member build
      - name: Typecheck
        run: bun run --filter @monobase/member typecheck
      - name: Unit tests
        run: bun run --filter @monobase/member test
      # NOTE (lean launch): e2e-member job deferred — needs live API + seed-in-CI.
      # Re-add when apps/member has a seed-paylink fixture available in CI.

  build-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api-ts/Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Verify container health — /livez responds
        run: |
          docker run --rm -d --name api-health-test -p 7213:7213 \
            -e DATABASE_URL=postgresql://fake:5432/fake \
            -e AUTH_SECRET=ci-health-test \
            -e INTERNAL_SERVICE_TOKEN=ci-test-token \
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          # Poll /livez (liveness — no DB needed) for up to 15s
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:7213/livez; then
              echo "Container healthy — /livez 200"
              docker stop api-health-test || true
              exit 0
            fi
            sleep 1
          done
          echo "::error::Container /livez never responded"
          docker logs api-health-test || true
          docker stop api-health-test || true
          exit 1

  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: monobase
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d monobase"
          --health-interval 5s --health-timeout 5s --health-retries 10
      # stripe-mock: canned Stripe API responses so the gated billing specs
      # (billing-lifecycle.hurl, billing-extended-flow.hurl) run instead of
      # being skipped. No healthcheck — boots in <1s, well before API + seed.
      stripe-mock:
        image: stripe/stripe-mock:latest
        ports: ['12111:12111']
      # Minio started as a step (see comment in the start-minio step).
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase
      PORT: 7213
      API_URL: http://localhost:7213
      AUTH_SECRET: contract-test-secret-do-not-use-in-prod
      # Stripe billing specs: point the app's Stripe SDK at stripe-mock (STRIPE_URL),
      # tell the contract runner's preflight where to probe (STRIPE_API_BASE), and
      # set any test key so run-contract-tests un-gates the stripeSpecs set.
      STRIPE_SECRET_KEY: sk_test_contract_do_not_use_in_prod
      STRIPE_URL: http://localhost:12111
      STRIPE_API_BASE: http://localhost:12111
      # The contract suite signs up many ad-hoc users and immediately uses the
      # session; the dedicated email-verification flows (auth-verification.hurl)
      # exercise verification explicitly. Without this, signup yields no session
      # (401) and re-sign-in is blocked (403 EMAIL_NOT_VERIFIED) — matches the
      # local dev .env which sets it false. Default is true.
      AUTH_REQUIRE_EMAIL_VERIFICATION: false
      # The contract runner (scripts/run-contract-tests.ts) auto-promotes this
      # email to platform_admin on sign-up; admin-gated flows ({{admin_token}},
      # GET /audit/logs cross-org reads) need it. Matches local dev .env.
      AUTH_ADMIN_EMAILS: admin@contract-tests.local
      # HMAC secret for one-tap dues payment tokens. getPaymentTokenSecret()
      # throws (500) when neither PAYMENT_TOKEN_SECRET nor INVITE_TOKEN_SECRET is
      # set — breaks send-link + /pay/:token/validate. Matches local dev .env.
      PAYMENT_TOKEN_SECRET: contract-test-payment-secret-do-not-use-in-prod
      # Enables the Postmark bounce/complaint webhook (BR-55/56) so the
      # email-suppression-webhook.hurl signed cases return 200 not 503.
      POSTMARK_WEBHOOK_SECRET: contract-test-postmark-secret-do-not-use-in-prod
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: monobase-files
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin
    steps:
      - uses: actions/checkout@v4
      - name: Start minio (server mode)
        run: |
          # Retry image pulls — Docker Hub transient timeouts (context deadline
          # exceeded / exit 125) were flaking ~half of CI runs. Pre-pull with
          # backoff so a registry hiccup self-heals.
          pull() { for i in 1 2 3 4 5; do docker pull "$1" && return 0; echo "pull $1 failed (try $i), retrying"; sleep $((i * 4)); done; echo "pull $1 failed after retries" >&2; return 1; }
          pull minio/minio:latest && pull minio/mc:latest
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            --health-cmd "curl -fsS http://localhost:9000/minio/health/live" \
            --health-interval=5s --health-timeout=5s --health-retries=20 \
            minio/minio:latest server /data
          for i in $(seq 1 12); do
            status=$(docker inspect --format='{{.State.Health.Status}}' minio 2>/dev/null || echo "starting")
            echo "minio health: $status"
            if [ "$status" = "healthy" ]; then break; fi
            sleep 5
          done
          if [ "$(docker inspect --format='{{.State.Health.Status}}' minio)" != "healthy" ]; then
            echo "minio did not become healthy in time" >&2
            docker logs minio
            exit 1
          fi
          docker run --rm --network host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:9000 \
            minio/mc mb --ignore-existing local/monobase-files
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Install Hurl
        run: |
          curl -fsSL -o /tmp/hurl.deb \
            https://github.com/Orange-OpenSource/hurl/releases/download/8.0.1/hurl_8.0.1_amd64.deb
          sudo dpkg -i /tmp/hurl.deb
      - name: Build OpenAPI spec
        run: bun run --filter @monobase/api-spec build
      - name: Generate API codegen
        run: bun run --filter @monobase/api-ts generate
      - name: Boot API
        run: |
          cd services/api-ts
          bun dev > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
      - name: Wait for API
        run: |
          # /readyz returns 200 only after migrations + storage + jobs scheduler
          # have all initialized — /livez returns 200 immediately and would race
          # the seed step against in-flight migrations.
          for i in $(seq 1 60); do
            curl -fsS "$API_URL/readyz" && exit 0
            sleep 1
          done
          echo "API never became ready"
          tail -200 /tmp/api.log
          exit 1
      - name: Seed database
        run: cd services/api-ts && bun run db:seed
      - name: Run contract tests
        run: bun run test:contract
      - name: API logs
        if: always()
        run: tail -500 /tmp/api.log || true

  coverage-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Decoupled from e2e (CONTINUE-57): coverage checks (BR/CSRF/matrix) are
    # static and must not be skipped just because a long suite is red.
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: BR coverage regression check
        run: bun run scripts/br-coverage.ts --ci
      - name: CSRF injection drift check
        # Fails if any .hurl scenario lost its CSRF preamble or x-csrf-token / Origin header.
        run: bun scripts/audit/inject-csrf-into-hurl.ts --check
      - name: Coverage matrix (BR + Flow + Route)
        # Regenerates docs/audits/COVERAGE_MATRIX.md and .audits/coverage-matrix.json.
        # Ratchet gate: fails ONLY if a gap GROWS vs scripts/audit/coverage-baseline.json.
        # Ratchet the baseline down after closing gaps:
        #   bun scripts/audit/coverage-matrix.ts --gate --update-baseline
        run: bun scripts/audit/coverage-matrix.ts --gate
      - name: Upload coverage matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-matrix
          path: |
            docs/audits/COVERAGE_MATRIX.md
            .audits/coverage-matrix.json

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: monobase
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d monobase"
          --health-interval 5s --health-timeout 5s --health-retries 10
      # Minio started as a step (see contract job comment).
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase
      PORT: 7213
      API_URL: http://localhost:7213
      AUTH_SECRET: contract-test-secret-do-not-use-in-prod
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: monobase-files
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin
    steps:
      - uses: actions/checkout@v4
      - name: Start minio (server mode)
        run: |
          pull() { for i in 1 2 3 4 5; do docker pull "$1" && return 0; echo "pull $1 failed (try $i), retrying"; sleep $((i * 4)); done; echo "pull $1 failed after retries" >&2; return 1; }
          pull minio/minio:latest && pull minio/mc:latest
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            --health-cmd "curl -fsS http://localhost:9000/minio/health/live" \
            --health-interval=5s --health-timeout=5s --health-retries=20 \
            minio/minio:latest server /data
          for i in $(seq 1 12); do
            status=$(docker inspect --format='{{.State.Health.Status}}' minio 2>/dev/null || echo "starting")
            echo "minio health: $status"
            if [ "$status" = "healthy" ]; then break; fi
            sleep 5
          done
          if [ "$(docker inspect --format='{{.State.Health.Status}}' minio)" != "healthy" ]; then
            echo "minio did not become healthy in time" >&2
            docker logs minio
            exit 1
          fi
          docker run --rm --network host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:9000 \
            minio/mc mb --ignore-existing local/monobase-files
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Build OpenAPI spec
        run: bun run --filter @monobase/api-spec build
      - name: Generate API codegen
        run: bun run --filter @monobase/api-ts generate
      - name: Apply DB migrations
        # The real-PG integration tests exercise the migrated `public` schema.
        # The Postgres service starts empty, so migrate before running tests.
        run: cd services/api-ts && bun run scripts/ci-migrate.ts
      # Unit (mocked) and integration (real-DB) suites run as SEPARATE bun
      # processes. mock.module()/stubRepo() in unit tests mutate process-global
      # state that leaked into same-process real-DB tests (repo.X is not a
      # function), failing this job non-deterministically. Isolation fixes it.
      - name: Run unit tests (mocked, isolated process)
        run: cd services/api-ts && bun run test:unit
      - name: Run integration tests (real DB, isolated process)
        run: cd services/api-ts && bun run test:integration
      - name: Run SDK unit tests
        run: cd packages/sdk-ts && bun run test

  new-code-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Check new handlers have tests
        run: bun run scripts/new-code-gate.ts --base origin/${{ github.base_ref }}

  ci-gate:
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs:
      - lint-typecheck
      - unit-tests
      - contract
      - build-api
      - coverage-gate
      - new-code-gate
      - member
    steps:
      - name: Check all gates passed
        run: |
          echo "Gate results:"
          echo "  lint-typecheck: ${{ needs.lint-typecheck.result }}"
          echo "  unit-tests: ${{ needs.unit-tests.result }}"
          echo "  contract: ${{ needs.contract.result }}"
          echo "  build-api: ${{ needs.build-api.result }}"
          echo "  coverage-gate: ${{ needs.coverage-gate.result }}"
          echo "  new-code-gate: ${{ needs.new-code-gate.result }}"
          echo "  member: ${{ needs.member.result }}"
          if [[ "${{ needs.lint-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.contract.result }}" != "success" ]] || \
             [[ "${{ needs.build-api.result }}" != "success" ]] || \
             [[ "${{ needs.coverage-gate.result }}" != "success" ]] || \
             [[ "${{ needs.new-code-gate.result }}" == "failure" ]] || \
             [[ "${{ needs.member.result }}" != "success" ]]; then
            echo "::error::One or more CI gates failed"
            exit 1
          fi
          echo "All gates passed"
