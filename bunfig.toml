# ponytail: root DOM/e2e test harness (test-setup-root.ts) removed with the deleted
# frontend apps; services/api-ts has its own bunfig preload. Re-add a [test] preload
# here only if a new root-level test suite needs one.
[install]
# Use isolated mode (pnpm-style) for strict dependency isolation
linker = "isolated"

# Install packages to individual package node_modules directories
# This ensures better isolation between packages
cache = true

# Skip optional dependencies for faster installs
optional = false

# Logging configuration
logLevel = "info"
