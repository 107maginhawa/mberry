[tools]
bun = "1.3.5"
rust = "1.90.0"

[tasks.build]
description = "Build JS bundle and Rust library"
run = "bun run src-js/build.ts && cargo build"

[tasks."build:js"]
description = "Build JS bundle only"
run = "bun run src-js/build.ts"

[tasks."build:release"]
description = "Build release Rust library (includes JS bundle via build.rs)"
run = "cargo build --release"

[tasks.test]
description = "Run test server"
run = "cargo test --test test_server -- --nocapture"

[tasks.clean]
description = "Clean all build artifacts"
run = "rm -rf dist/ && cargo clean"
