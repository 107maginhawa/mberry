services:
  postgres:
    image: postgres:17
    container_name: cadence-stress-postgres-${TEST_INSTANCE:-default}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: stress-test
      POSTGRES_DB: cadence_stress
    ports:
      - "${POSTGRES_PORT:-15435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - stress-network

  valkey:
    image: valkey/valkey:latest
    container_name: cadence-stress-valkey-${TEST_INSTANCE:-default}
    command: ["valkey-server", "--requirepass", "stress-test"]
    ports:
      - "${VALKEY_PORT:-16380}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "--pass", "stress-test", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /data
    networks:
      - stress-network

networks:
  stress-network:
    driver: bridge
    name: cadence-stress-network-${TEST_INSTANCE:-default}
