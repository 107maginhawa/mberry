  - { method: POST,   path: "/association/member/org/:organizationId/subscription/upgrade",   reason: legacy-deferred,     owner: association:member,  note: "subscription upgrade, not in TypeSpec" }
  - { method: POST,   path: "/association/member/org/:organizationId/subscription/checkout",  reason: legacy-deferred,     owner: association:member,  note: "subscription checkout, not in TypeSpec" }

  # Announcement scheduling + stats
