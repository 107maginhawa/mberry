  # Admin pricing tier CRUD
  - { method: GET,    path: "/admin/pricing",                                                  reason: legacy-deferred,     owner: platformadmin,       note: "admin pricing tier CRUD, not in TypeSpec" }
  - { method: POST,   path: "/admin/pricing",                                                  reason: legacy-deferred,     owner: platformadmin,       note: "admin pricing tier CRUD, not in TypeSpec" }
  - { method: PUT,    path: "/admin/pricing/:tierId",                                          reason: legacy-deferred,     owner: platformadmin,       note: "admin pricing tier CRUD, not in TypeSpec" }

  # Admin subscription management
  - { method: GET,    path: "/admin/subscriptions",                                            reason: legacy-deferred,     owner: platformadmin,       note: "admin subscription management, not in TypeSpec" }
  - { method: GET,    path: "/admin/subscriptions/:id",                                        reason: legacy-deferred,     owner: platformadmin,       note: "admin subscription management, not in TypeSpec" }
  - { method: PUT,    path: "/admin/subscriptions/:id/cancel",                                reason: legacy-deferred,     owner: platformadmin,       note: "admin subscription management, not in TypeSpec" }

  # Platform revenue/health analytics
  - { method: GET,    path: "/admin/analytics/revenue",                                        reason: legacy-deferred,     owner: platformadmin,       note: "platform revenue analytics, not in TypeSpec" }
  - { method: GET,    path: "/admin/analytics/health",                                         reason: legacy-deferred,     owner: platformadmin,       note: "platform org health scores, not in TypeSpec" }

  # Org-facing subscription routes
