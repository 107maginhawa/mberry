  # Survey export/clone/analytics
  - { method: GET,    path: "/surveys/:survey/export",                                         reason: legacy-deferred,     owner: surveys,             note: "survey export, not in TypeSpec" }
  - { method: POST,   path: "/surveys/:survey/clone",                                          reason: legacy-deferred,     owner: surveys,             note: "survey clone, not in TypeSpec" }
  - { method: GET,    path: "/surveys/analytics/nps-trends",                                  reason: legacy-deferred,     owner: surveys,             note: "NPS trends analytics, not in TypeSpec" }
  - { method: DELETE, path: "/surveys/my-responses",                                           reason: legacy-deferred,     owner: surveys,             note: "member survey response deletion, not in TypeSpec" }

  # Admin survey dashboard
  - { method: GET,    path: "/admin/surveys",                                                  reason: legacy-deferred,     owner: platformadmin,       note: "admin survey dashboard, platform admin only" }
